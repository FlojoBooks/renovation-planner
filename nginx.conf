# ── Globale instellingen ──────────────────────────────────────────────────────
worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Verberg nginx versie in response headers
    server_tokens off;

    # ── Gzip compressie ───────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        application/xhtml+xml
        image/svg+xml
        font/ttf
        font/opentype
        font/x-woff
        application/font-woff
        application/font-woff2;

    # ── Server ────────────────────────────────────────────────────────────────
    server {
        listen      8080;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header X-XSS-Protection          "1; mode=block"                     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # ── Health check endpoint (Railway + Docker HEALTHCHECK) ──────────────
        location /health {
            access_log  off;
            return 200  'OK';
            add_header  Content-Type text/plain;
        }

        # ── Statische assets – agressieve caching (fingerprinted door Vite) ──
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
        }

        # ── HTML-bestanden – nooit cachen (voor SPA-updates) ─────────────────
        location ~* \.html$ {
            expires     -1;
            add_header  Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ── SPA fallback – alle routes naar index.html ────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Verberg dotfiles ──────────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log  off;
            log_not_found off;
        }
    }
}
